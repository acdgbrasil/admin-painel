version: '1.2'

summary:
  generatePRSummary: true
  customInstructions: >
    Summarize changes by layer (presenter, application, data, server).
    Highlight auth changes, XSS risks, new use cases, and Zitadel API integration changes.
  behaviourForExistingDescription: concatenate

ignorePaths:
  - node_modules/
  - bun.lockb
  - .env
  - .env.*
  - public/app.js
  - coverage/

baseBranches: []

reviewOptions:
  security: true
  code_style: true
  kody_rules: true
  refactoring: true
  error_handling: true
  maintainability: true
  potential_issues: true
  documentation_and_comments: false
  performance_and_optimization: true
  business_logic: true

suggestionControl:
  groupingMode: full
  limitationType: pr
  maxSuggestions: 9
  severityLevelFilter: medium

ignoredTitleKeywords:
  - chore
  - docs
  - ci

automatedReviewActive: true
pullRequestApprovalActive: false
isRequestChangesActive: false
llmGeneratedMemoriesRequireApproval: false
